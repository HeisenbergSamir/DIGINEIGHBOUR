<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — CommunityAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:#2a3347;--text:#e8ecf4;--text2:#8b95a8;--accent:#4f8ef7;--accent2:#3b6fd4;--danger:#ef4444;--success:#22c55e}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:380px;padding:20px}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{font-size:44px;margin-bottom:10px}
.logo h1{font-size:20px;font-weight:700}
.logo p{font-size:12px;color:var(--text2);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:26px}
.card h2{font-size:15px;font-weight:600;margin-bottom:3px}
.card p{font-size:12px;color:var(--text2);margin-bottom:20px}
.fg{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 12px;font-size:14px;font-family:inherit}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,142,247,.1)}
.btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px}
.btn:hover{background:var(--accent2)}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger);padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:14px}
.footer{text-align:center;margin-top:18px;font-size:11px;color:var(--text2)}
</style></head><body>
<div class="wrap">
  <div class="logo"><div class="logo-icon">🏘️</div><h1>CommunityAI</h1><p>Admin Dashboard</p></div>
  <div class="card">
    <h2>Sign In</h2><p>Admin access only</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat,msg in messages %}<div class="error">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="fg"><label>Username</label><input type="text" name="username" required autocomplete="username" placeholder="Your username"></div>
      <div class="fg"><label>Password</label><input type="password" name="password" required autocomplete="current-password" placeholder="Your password"></div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <div class="footer">🔒 All actions are logged</div>
</div>
</body></html>
